<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Policies</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: white;
  text-align: center;
}

.container {
  padding: 40px 20px;
}

h1 {
  font-size: 40px;
  margin-bottom: 10px;
}

p {
  opacity: 0.9;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
  margin-top: 40px;
}

.card {
  background: rgba(255,255,255,0.1);
  padding: 25px;
  border-radius: 15px;
  transition: 0.3s;
  text-decoration: none;
  color: white;
}

.card:hover {
  transform: translateY(-10px) scale(1.02);
  background: rgba(255,255,255,0.2);
}

.footer {
  margin-top: 50px;
  font-size: 14px;
  opacity: 0.7;
}
</style>
</head>

<body>

<div class="container">
  <h1>My Policies Hub</h1>
  <p>Privacy Policies & Disclaimers for Apps and Content</p>

  <div class="grid">

    <a href="app1-privacy.html" class="card">
      <h2>📱 App 1</h2>
      <p>Privacy Policy</p>
    </a>

    <a href="app2-privacy.html" class="card">
      <h2>📱 App 2</h2>
      <p>Privacy Policy</p>
    </a>

    <a href="youtube-disclaimer.html" class="card">
      <h2>🎥 YouTube</h2>
      <p>Disclaimer</p>
    </a>

  </div>

  <div class="footer">
    © 2026 Your Name | All Rights Reserved
  </div>
</div>

</body>
</html>
